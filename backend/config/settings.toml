# =============================================================================
# Research-Flow backend shared defaults
# Put non-secret defaults here. Put local credentials in backend/.env.
# =============================================================================

[app]
host = "127.0.0.1"
port = 8000
env = "development"
debug = true

[zotero]
enabled = true
command = "zotero-mcp"
args = ["serve"]
transport = "stdio"
local_mode = "local"
library_type = "user"
pythonioencoding = "utf-8"
pythonutf8 = "1"
timeout_seconds = 60

[paper_download]
output_dir = "data/papers"
timeout = 30
retries = 2
retry_wait = 2
rate_limit_wait = 20
min_pdf_size = 4096
overwrite = false

[mineru]
base_url = "https://mineru.net"
model = "vlm"
http_timeout_seconds = 300
poll_interval_seconds = 5
poll_timeout_seconds = 900
pdf_parse_excerpt_chars = 1200
pdf_parse_min_chars = 200
llm_pdf_context_chars = 14000
llm_pdf_section_chars = 2600

[llm]
default_feature = "default_chat"

[llm.platforms.deepseek]
provider_type = "openai_compatible"
base_url = "https://api.deepseek.com/v1"
api_key = "${DEEPSEEK_API_KEY}"
timeout = 60
max_retries = 2

[llm.platforms.siliconflow]
provider_type = "openai_compatible"
base_url = "https://api.siliconflow.cn/v1"
api_key = "${SILICONFLOW_API_KEY}"
timeout = 60
max_retries = 2

[llm.models.chat_fast]
platform = "deepseek"
model = "deepseek-chat"
purpose = "通用快速对话"
temperature = 0.7
max_tokens = 4096
supports_vision = false
supports_tools = false

[llm.models.chat_glm]
platform = "siliconflow"
model = "THUDM/GLM-Z1-9B-0414"
purpose = "智谱 GLM 模型"
temperature = 0.3
max_tokens = 4096

[llm.models.chat_hunyuan]
platform = "siliconflow"
model = "tencent/Hunyuan-MT-7B"
purpose = "腾讯混元模型"
temperature = 0.3
max_tokens = 4096

[llm.models.chat_kimi]
platform = "siliconflow"
model = "Pro/moonshotai/Kimi-K2.5"
purpose = "月之暗面 Kimi 模型"
temperature = 0.3
max_tokens = 4096

[llm.features.default_chat]
model = "chat_fast"

[llm.features.fast_chat]
model = "chat_glm"
