# =============================================================================
# Research-Flow backend shared defaults
# Put non-secret defaults here. Put local credentials in backend/.env.
# =============================================================================

[app]
host = "127.0.0.1"
port = 8000
env = "development"
debug = true

[zotero]
enabled = true
command = "zotero-mcp"
args = ["serve"]
transport = "stdio"
local_mode = "local"
library_type = "user"
pythonioencoding = "utf-8"
pythonutf8 = "1"
timeout_seconds = 60

[paper_download]
output_dir = "data/papers"
timeout = 30
retries = 2
retry_wait = 2
rate_limit_wait = 20
min_pdf_size = 4096
overwrite = false

[mineru]
base_url = "https://mineru.net"
model = "vlm"
http_timeout_seconds = 300
poll_interval_seconds = 5
poll_timeout_seconds = 900
pdf_parse_excerpt_chars = 1200
pdf_parse_min_chars = 200
llm_pdf_context_chars = 14000
llm_pdf_section_chars = 2600

[pdf_parser.markdown_refine]
enabled = true
feature = "pdf_markdown_refiner"
runtime_instruction_key = "paper_refine_parse.default"
output_filename = "LLM.refined.md"
fail_open = true

[llm]
default_feature = "default_chat"

[llm.platforms.deepseek]
provider_type = "openai_compatible"
base_url = "https://api.deepseek.com/v1"
api_key = "${DEEPSEEK_API_KEY}"
timeout = 60
max_retries = 2

[llm.platforms.siliconflow]
provider_type = "openai_compatible"
base_url = "https://api.siliconflow.cn/v1"
api_key = "${SILICONFLOW_API_KEY}"
timeout = 60
max_retries = 2

[llm.platforms.xiaomi]
provider_type = "openai_compatible"
base_url = "https://token-plan-cn.xiaomimimo.com/v1"
api_key = "${XIAOMI_API_KEY}"
timeout = 60
max_retries = 2

[llm.models.chat_fast]
platform = "deepseek"
model = "deepseek-chat"
purpose = "通用快速对话"
temperature = 0.7
max_tokens = 4096
supports_vision = false
supports_tools = false

[llm.models.chat_kimi_26]
platform = "siliconflow"
model = "Pro/moonshotai/Kimi-K2.6"
purpose = "Kimi K2.6"
temperature = 0.3

[llm.models.chat_hunyuan]
platform = "siliconflow"
model = "tencent/Hunyuan-MT-7B"
purpose = "腾讯混元模型"
temperature = 0.3
max_tokens = 4096

[llm.models.chat_kimi]
platform = "siliconflow"
model = "Pro/moonshotai/Kimi-K2.5"
purpose = "月之暗面 Kimi 模型"
temperature = 0.3
max_tokens = 4096

[llm.models.chat_xiaomi]
platform = "xiaomi"
model = "mimo-v2.5-pro"
purpose = "小米 mimo-v2.5-pro"
temperature = 0.3
max_tokens = 4096

[llm.features.default_chat]
model = "chat_fast"

[llm.features.pdf_markdown_refiner]
model = "chat_kimi_26"
system_prompt = "You are a careful academic Markdown editor. Return only cleaned Markdown."
temperature = 0.1

[llm.features.paper_refine_parse_diagnose]
model = "chat_fast"
system_prompt = "You diagnose MinerU academic Markdown and return only JSON."
temperature = 0.0

[llm.features.paper_refine_parse_repair]
model = "chat_fast"
system_prompt = "You emit deterministic line-based Markdown repair patches as JSON."
temperature = 0.0

[llm.features.paper_refine_parse_verify]
model = "chat_fast"
system_prompt = "You verify academic Markdown refinements and return only JSON."
temperature = 0.0

[llm.features.paper_sectioning_default]
model = "chat_fast"
system_prompt = "You map academic paper headings to canonical section line ranges and return only JSON."
temperature = 0.0

[llm.features.paper_note_generate_default]
model = "chat_fast"
system_prompt = "You generate evidence-grounded academic paper notes and return only JSON."
temperature = 0.1

[llm.features.paper_note_generate_block]
model = "chat_fast"
system_prompt = "You generate one evidence-grounded academic paper note block and return only JSON."
temperature = 0.1

[llm.features.paper_knowledge_extract]
model = "chat_fast"
system_prompt = "You extract evidence-grounded reusable academic knowledge from paper notes and return only JSON."
temperature = 0.0

[llm.features.paper_dataset_extract]
model = "chat_fast"
system_prompt = "You extract dataset, benchmark, task, metric, and evidence records from paper notes and return only JSON."
temperature = 0.0

[llm.features.project_generate_related_work_default]
model = "chat_kimi_26"
system_prompt = "You synthesize project related work from linked papers and project notes. Return only JSON."
temperature = 0.3

[llm.features.project_generate_method_default]
model = "chat_kimi_26"
system_prompt = "You draft project method content from linked papers and project notes. Return only JSON."
temperature = 0.3

[llm.features.project_generate_experiment_default]
model = "chat_kimi_26"
system_prompt = "You draft project experiment planning content from linked papers and project notes. Return only JSON."
temperature = 0.3

[llm.features.project_generate_conclusion_default]
model = "chat_kimi_26"
system_prompt = "You summarize project conclusions, open problems, and next steps. Return only JSON."
temperature = 0.3

[llm.features.project_generate_manuscript_default]
model = "chat_kimi_26"
system_prompt = "You compile manuscript draft sections from project modules. Return only JSON."
temperature = 0.3
